<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forecaster — 4F</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a class="site-logo" href="index.html">4<span>F</span></a>
      <nav class="primary-nav" id="main-nav"></nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <h1 class="page-title">Forecaster</h1>
      <p class="page-subtitle">Asset class aggregation and growth projections across all owners</p>

      <!-- Current Allocation Table -->
      <div class="card mb-3">
        <div class="card-header">
          <h2 class="card-title">Current Allocation by Asset Class</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Asset Class</th>
                <th class="text-right">LFRM</th>
                <th class="text-right">JJB</th>
                <th class="text-right">Juju</th>
                <th class="text-right">Total</th>
                <th class="text-right">% of Total</th>
                <th class="text-right">Est. Income</th>
              </tr>
            </thead>
            <tbody id="forecast-body">
              <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
            </tbody>
            <tfoot id="forecast-foot"></tfoot>
          </table>
        </div>
      </div>

      <!-- Growth Simulation -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Growth Simulation</h2>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="growth-rate">Annual Growth Rate (%)</label>
            <input type="number" id="growth-rate" value="7" step="0.5">
          </div>
          <div class="form-group">
            <label for="growth-years">Years</label>
            <input type="number" id="growth-years" value="10" min="1" max="50">
          </div>
          <div class="form-group" style="align-self:flex-end">
            <button class="btn" id="simulate-btn">Simulate</button>
          </div>
        </div>

        <div id="simulation-area" class="hidden mt-2">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Year</th>
                  <th class="text-right">Portfolio Value</th>
                  <th class="text-right">Growth</th>
                  <th class="text-right">Est. Income</th>
                </tr>
              </thead>
              <tbody id="simulation-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">4F v2</div>
  </footer>

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/process-transactions.js"></script>
  <script src="js/forecaster.js"></script>
  <script>
    Utils.initPage('Forecaster', initForecaster);
  </script>
</body>
</html>
