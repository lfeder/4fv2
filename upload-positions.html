    function run() {
      var btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Working...';
      log('Initializing Sheets API...');

      SheetsAPI.initSheetsApi()
        .then(function () {
          log('Authenticated.', 'ok');
          return SheetsAPI.ensureAllTabs();
        })
        .then(function () {
          log('Tabs verified.');
          log('Uploading ' + ASSETS.length + ' assets...');
          return SheetsAPI.upsertRows('assets', ASSETS, 0);
        })
        .then(function (r) {
          log('Assets: ' + r.added + ' added, ' + r.skipped + ' skipped', 'ok');
          log('Uploading ' + MARKS.length + ' marks...');
          return SheetsAPI.upsertRows('marks', MARKS, 0, 1);
        })
        .then(function (r) {
          log('Marks: ' + r.added + ' added, ' + r.skipped + ' skipped', 'ok');
          log('Uploading ' + TRANSACTIONS.length + ' transactions...');
          return SheetsAPI.upsertRows('transactions', TRANSACTIONS, 2, 3);
        })
        .then(function (r) {
          log('Transactions: ' + r.added + ' added, ' + r.skipped + ' skipped', 'ok');
          log('\nDone! All position data uploaded.', 'ok');
          btn.textContent = 'Done';
        })
        .catch(function (err) {
          log('ERROR: ' + (err.message || err), 'err');
          btn.disabled = false;
          btn.textContent = 'Retry';
        });
